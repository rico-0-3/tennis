name: 🎾 Aggiorna Dati Tennis

on:
  workflow_dispatch:
    inputs:
      esegui_scraping:
        description: 'Scraping ATP (Ranking + Partite + Elaborazione)'
        required: false
        type: boolean
        default: true
      esegui_fusione:
        description: 'Fusione Storico'
        required: false
        type: boolean
        default: true
      esegui_profili:
        description: 'Profili Giocatori'
        required: false
        type: boolean
        default: true
      esegui_court_speed:
        description: 'Court Speed (scraping + arricchimento)'
        required: false
        type: boolean
        default: true
      esegui_modelli:
        description: 'Training Modelli (XGBoost, Ensemble, LR)'
        required: false
        type: boolean
        default: false
      esegui_ann:
        description: 'Training ANN (lento ~1-2h)'
        required: false
        type: boolean
        default: false

jobs:
  aggiorna:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 🌐 Installa Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: 'stable'

      - name: 📦 Installa dipendenze
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎾 Esegui Pipeline
        run: |
          python run_pipeline.py \
            ${{ inputs.esegui_scraping == true && '--scraping' || '' }} \
            ${{ inputs.esegui_fusione == true && '--fusione' || '' }} \
            ${{ inputs.esegui_profili == true && '--profili' || '' }} \
            ${{ inputs.esegui_court_speed == true && '--court-speed' || '' }} \
            ${{ inputs.esegui_modelli == true && '--modelli' || '' }} \
            ${{ inputs.esegui_ann == true && '--ann' || '' }}

      - name: 📤 Commit & Push risultati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A scraping/ prediccion/
          if git diff --cached --quiet; then
            echo "✅ Nessun cambiamento rilevato"
          else
            git commit -m "🎾 Aggiornamento automatico dati $(date +'%Y-%m-%d %H:%M')"
            git push
            echo "✅ Dati aggiornati e pushati"
          fi
